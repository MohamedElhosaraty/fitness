name: Firebase App Distribution Dev

on:
  workflow_dispatch:

jobs:
  android-firebase-app-distribution:
    runs-on: ubuntu-latest
    env:
      FIREBASE_CLI_TOKEN: ${{ secrets.FIREBASE_CLI_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: "gradle"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: "true"


      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.4"
          bundler-cache: true
          working-directory: android


      - name: Prepare android signing
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE_BASE64: ${{ secrets.STORE_FILE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -e
          printf "%s" "$STORE_FILE_BASE64" | base64 --decode > android/upload-keystore.jks
          {
            echo "storePassword=${STORE_PASSWORD}"
            echo "keyPassword=${KEY_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "storeFile=../upload-keystore.jks"
          } > android/key.properties


      - name: Run fastlane distribute_release_to_firebase
        working-directory: android
        run: bundle exec fastlane distribute_release_to_firebase